name: Monorepo Build Images (Suggested)

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - feat/**
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  BACKEND_IMAGE_NAME: auction-api
  FRONTEND_IMAGE_NAME: auction-frontend

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auction
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: pip install -r auctionsite/requirements.txt

      - name: Run backend migrations
        run: python auctionsite/manage.py migrate

      - name: Run backend tests
        run: python auctionsite/manage.py test

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend SPA
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ""
          VITE_DOCS_BASE_URL: /api/docs/
        run: npm run build

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tags
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_DOCS_BASE_URL=/api/docs/
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}

  prepare-deployment-commands:
    runs-on: ubuntu-latest
    needs: build-and-push-images
    if: github.event_name != 'pull_request'

    steps:
      - name: Compute image tags
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Print manual kubectl commands
        run: |
          echo "Cluster deployment is intentionally disabled in this suggested workflow."
          echo "Use these commands later after you create and start your GKE cluster:"
          echo "kubectl apply -f k8s/postgres-secret.yaml"
          echo "kubectl apply -f k8s/postgres-service.yaml"
          echo "kubectl apply -f k8s/postgres-statefulset.yaml"
          echo "kubectl apply -f k8s/service.yaml"
          echo "kubectl apply -f k8s/deployment.yaml"
          echo "kubectl apply -f k8s/frontend-service.yaml"
          echo "kubectl apply -f k8s/frontend-deployment.yaml"
          echo "kubectl apply -f k8s/ingress.frontend-backend.suggested.yaml"
          echo "kubectl set image deployment/auction-api django=${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}"
          echo "kubectl set image deployment/auction-frontend nginx=${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}"

  # deploy-to-gke:
  #   This job is intentionally commented out because:
  #   1. your cluster is currently offline
  #   2. this repo is being prepared locally only
  #   3. you explicitly asked not to deploy yet
  #
  #   When you're ready, you can add:
  #   - Google Cloud authentication
  #   - gcloud / kubectl setup
  #   - kubectl apply / rollout steps
