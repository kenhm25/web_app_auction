name: Monorepo CI/CD (Suggested)

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - feat/**
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  CLUSTER_NAME: auction-cluster
  CLUSTER_REGION: asia-east1
  BACKEND_IMAGE_NAME: auction-api
  FRONTEND_IMAGE_NAME: auction-frontend

jobs:
  validate:
    name: Validate backend and frontend
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auction
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: pip install -r auctionsite/requirements.txt

      - name: Run Django migrations
        run: python auctionsite/manage.py migrate

      - name: Run Django tests
        run: python auctionsite/manage.py test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend production build validation
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ""
          VITE_DOCS_BASE_URL: /api/docs/
        run: npm run build

  build-and-push-images:
    name: Build and push backend/frontend images
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute immutable image tag
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            VITE_DOCS_BASE_URL=/api/docs/
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}

  deploy-to-gke:
    name: Deploy immutable backend/frontend images to GKE
    runs-on: ubuntu-latest
    needs: build-and-push-images
    if: |
      ${{ 
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/feat/frontend-production-architecture'
      }}
    
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin

      - name: Get GKE cluster credentials
        run: |
          gcloud container clusters get-credentials "${{ env.CLUSTER_NAME }}" \
            --region "${{ env.CLUSTER_REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/postgres-secret.yaml
          kubectl apply -f k8s/postgres-service.yaml
          kubectl apply -f k8s/postgres-statefulset.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/ingress.frontend-backend.suggested.yaml

      - name: Roll out immutable backend and frontend image versions
        run: |
          # Deploy the same immutable git SHA for both services so one revision
          # always corresponds to a matched frontend/backend pair.
          kubectl set image deployment/auction-api \
            django=${{ secrets.DOCKER_USERNAME }}/${{ env.BACKEND_IMAGE_NAME }}:${{ needs.build-and-push-images.outputs.sha_short }}

          kubectl set image deployment/auction-frontend \
            nginx=${{ secrets.DOCKER_USERNAME }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ needs.build-and-push-images.outputs.sha_short }}

      - name: Wait for backend rollout
        run: kubectl rollout status deployment/auction-api

      - name: Wait for frontend rollout
        run: kubectl rollout status deployment/auction-frontend

      - name: Explain deployment strategy
        run: |
          echo "Immutable SHA tags are used for rollout so every deployment is traceable to one git revision."
          echo "The latest tag is still published for convenience, but it is not used for rollout because latest is mutable."
          echo "Deployment is restricted to main branch pushes to prevent feature branches from changing production automatically."
