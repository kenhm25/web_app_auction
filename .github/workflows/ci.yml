name: Django CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:

    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auction
          POSTGRES_USER: auction
          POSTGRES_PASSWORD: auction
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r auctionsite/requirements.txt

    - name: Run migrations
      run: |
        python auctionsite/manage.py migrate

    - name: Run tests
      run: |
        python auctionsite/manage.py test


    - name: Extract git SHA
      id: vars
      run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/auction-api:latest \
                     -t ${{ secrets.DOCKER_USERNAME }}/auction-api:${{ steps.vars.outputs.SHA }} .

    - name: Push Docker images
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/auction-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/auction-api:${{ steps.vars.outputs.SHA }}
    
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
    
    - name: Configure kubeconfig
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
    
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/
        kubectl rollout restart deployment auction-api