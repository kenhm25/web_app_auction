services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: auction
      POSTGRES_USER: auction
      POSTGRES_PASSWORD: auction
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn auctionsite.wsgi:application 
      --bind 0.0.0.0:8000 
      --workers 3 
      --reload
      "

    volumes:
      - ./auctionsite:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: >
      sh -c "
      npm install &&
      npm run dev -- --host 0.0.0.0
      "
    environment:
      VITE_PROXY_TARGET: http://web:8000
    ports:
      - "5173:5173"
    depends_on:
      - web
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  pgdata:
  frontend_node_modules:
