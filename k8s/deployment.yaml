apiVersion: apps/v1
kind: Deployment
metadata:
  name: auction-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auction-api

  template:
    metadata:
      labels:
        app: auction-api

    spec:
      containers:
        - name: django
          image: kenhm25/auction-api:latest

          command:
            - sh
            - -c
            - |
              python manage.py migrate &&
              gunicorn auctionsite.wsgi:application --bind 0.0.0.0:8000

          env:
            - name: DB_HOST
              value: postgres

          ports:
            - containerPort: 8000